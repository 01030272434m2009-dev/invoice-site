<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تفاصيل الفاتورة</title>

<style>

body{
font-family:Tahoma;
background:#f5f5f5;
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:800px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#2196f3;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#2196f3;
color:white;
}

.total{
font-size:20px;
color:green;
font-weight:bold;
margin-top:15px;
}

.footer{
margin-top:20px;
text-align:center;
}

</style>
</head>

<body>

<div class="box">

<h1>🧾 Veterinary Pharmacy</h1>

<p id="customer"></p>
<p id="phone"></p>
<p id="date"></p>
<p id="payment"></p>

<table>

<thead>
<tr>
<th>كود الصنف</th>
<th>اسم الصنف</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>
</tr>
</thead>

<tbody id="items"></tbody>

</table>

<p class="total" id="total"></p>

<div class="footer">

📞 01000000000  
<br>
📞 01100000000  

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const data = JSON.parse(atob(params.get("data")));

document.getElementById("customer").innerText=data.customer;
document.getElementById("phone").innerText=data.phone;
document.getElementById("date").innerText=data.date;
document.getElementById("payment").innerText=data.payment;

let tbody=document.getElementById("items");

data.items.forEach(i=>{

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${i.code}</td>
<td>${i.name}</td>
<td>${i.qty}</td>
<td>${i.price}</td>
<td>${i.total}</td>
`;

tbody.appendChild(tr);

});

document.getElementById("total").innerText=data.total;

</script>

</body>
</html>
