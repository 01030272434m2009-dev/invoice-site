<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<title>تفاصيل الفاتورة</title>

<style>

body{
font-family:Tahoma;
background:#f5f5f5;
padding:20px;
direction:rtl
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
max-width:900px;
margin:auto
}

h2{
text-align:center
}

.info{
margin:5px 0;
font-size:16px
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center
}

th{
background:#2196F3;
color:white
}

.total{
font-size:22px;
color:green;
margin-top:20px;
font-weight:bold;
text-align:center
}

.error{
text-align:center;
color:red;
font-size:20px
}

</style>

</head>

<body>

<div class="card">

<h2>🧾 تفاصيل الفاتورة</h2>

<p id="customer" class="info"></p>
<p id="phone" class="info"></p>
<p id="payment" class="info"></p>
<p id="date" class="info"></p>

<table>

<thead>

<tr>

<th>الكود</th>
<th>الصنف</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>

</tr>

</thead>

<tbody id="items"></tbody>

</table>

<div id="total" class="total"></div>

</div>


<script>

function getParam(name){
    let url=new URL(window.location.href);
    return url.searchParams.get(name);
}

// فك Base64 مع دعم العربية
function decodeBase64UTF8(base64){

    let binary=atob(base64);

    let bytes=new Uint8Array(binary.length);

    for(let i=0;i<binary.length;i++){
        bytes[i]=binary.charCodeAt(i);
    }

    return new TextDecoder().decode(bytes);
}

let encoded=getParam("data");

if(!encoded){
    document.body.innerHTML="<div class='error'>❌ لا توجد بيانات فاتورة</div>";
}
else{

try{

let decoded=decodeURIComponent(encoded);

let json=decodeBase64UTF8(decoded);

let invoice=JSON.parse(json);

// عرض البيانات

document.getElementById("customer").innerText=invoice.customer;
document.getElementById("phone").innerText=invoice.phone;
document.getElementById("payment").innerText=invoice.payment;
document.getElementById("date").innerText=invoice.date;
document.getElementById("total").innerText=invoice.total;

// عرض الأصناف

let rows="";

invoice.items.forEach(i=>{

rows+=`
<tr>
<td>${i.code}</td>
<td>${i.name}</td>
<td>${i.qty}</td>
<td>${i.price}</td>
<td>${i.total}</td>
</tr>
`;

});

document.getElementById("items").innerHTML=rows;

}
catch(e){

document.body.innerHTML="<div class='error'>❌ حدث خطأ في قراءة الفاتورة</div>";

}

}

</script>

</body>

</html>

</html>
