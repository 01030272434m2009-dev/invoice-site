<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تفاصيل الفاتورة</title>

<style>

body{
font-family:Tahoma;
background:#f5f5f5;
padding:20px;
direction:rtl
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center
}

th{
background:#2196F3;
color:white
}

.total{
font-size:20px;
color:green;
margin-top:20px
}

</style>
</head>

<body>

<div class="card">

<h2>🧾 تفاصيل الفاتورة</h2>

<p id="customer"></p>
<p id="phone"></p>
<p id="date"></p>
<p id="payment"></p>

<table>
<thead>
<tr>
<th>كود</th>
<th>اسم الصنف</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>
</tr>
</thead>

<tbody id="items"></tbody>

</table>

<div class="total" id="total"></div>

</div>


<script>

function getQueryParam(name)
{
let url=new URL(window.location.href);
return url.searchParams.get(name);
}

let data=getQueryParam("data");

if(data)
{

let json=atob(data);

let invoice=JSON.parse(json);

document.getElementById("customer").innerText=invoice.customer;
document.getElementById("phone").innerText=invoice.phone;
document.getElementById("date").innerText=invoice.date;
document.getElementById("payment").innerText=invoice.payment;
document.getElementById("total").innerText=invoice.total;

let itemsHTML="";

invoice.items.forEach(i=>{

itemsHTML+=`

<tr>
<td>${i.code}</td>
<td>${i.name}</td>
<td>${i.qty}</td>
<td>${i.price}</td>
<td>${i.total}</td>
</tr>

`;

});

document.getElementById("items").innerHTML=itemsHTML;

}

</script>

</body>
</html>
