<!DOCTYPE html>

<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تفاصيل الفاتورة</title>

<style>

body{
font-family:Tahoma;
background:#f5f5f5;
padding:20px;
direction:rtl
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
max-width:900px;
margin:auto
}

h2{
text-align:center
}

.pharmacy{
text-align:center;
border-bottom:2px dashed #ddd;
padding-bottom:15px;
margin-bottom:20px
}

.pharmacy h3{
margin:5px 0;
color:#2c3e50
}

.info{
margin:5px 0;
font-size:16px
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center
}

th{
background:#2196F3;
color:white
}

.total{
font-size:22px;
color:green;
margin-top:20px;
font-weight:bold;
text-align:center
}

.thanks{
text-align:center;
margin-top:25px;
font-size:18px;
color:#444
}

.error{
text-align:center;
color:red;
font-size:20px
}

</style>

</head>

<body>

<div class="card">

<div class="pharmacy">

<h3 id="pharmacyName"></h3>
<p id="pharmacyAddress"></p>
<p id="pharmacyPhone"></p>
<p id="pharmacyCR"></p>
<p id="pharmacyTax"></p>
<p id="pharmacyWelcome"></p>

</div>

<h2>🧾 تفاصيل الفاتورة</h2>

<p id="customer" class="info"></p>
<p id="phone" class="info"></p>
<p id="payment" class="info"></p>
<p id="date" class="info"></p>

<table>

<thead>
<tr>
<th>الكود</th>
<th>الصنف</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>
</tr>
</thead>

<tbody id="items"></tbody>

</table>

<div id="total" class="total"></div>

<div id="thanks" class="thanks"></div>

</div>

<script>

function getParam(name){
let url=new URL(window.location.href);
return url.searchParams.get(name);
}

// فك Base64 مع دعم العربية
function decodeBase64UTF8(base64){

let binary=atob(base64);

let bytes=new Uint8Array(binary.length);

for(let i=0;i<binary.length;i++){
bytes[i]=binary.charCodeAt(i);
}

return new TextDecoder().decode(bytes);
}

let encoded=getParam("data");

if(!encoded){

document.body.innerHTML="<div class='error'>❌ لا توجد بيانات فاتورة</div>";

}else{

try{

let decoded=decodeURIComponent(encoded);

let json=decodeBase64UTF8(decoded);

let invoice=JSON.parse(json);

// بيانات الصيدلية

if(invoice.pharmacy){

document.getElementById("pharmacyName").innerText=invoice.pharmacy.name;
document.getElementById("pharmacyAddress").innerText="العنوان: "+invoice.pharmacy.address;
document.getElementById("pharmacyPhone").innerText="📞 "+invoice.pharmacy.phone;
document.getElementById("pharmacyCR").innerText="سجل تجاري: "+invoice.pharmacy.cr;
document.getElementById("pharmacyTax").innerText="بطاقة ضريبية: "+invoice.pharmacy.tax;
document.getElementById("pharmacyWelcome").innerText=invoice.pharmacy.welcome;
document.getElementById("thanks").innerText=invoice.pharmacy.thanks;

}

// بيانات الفاتورة

document.getElementById("customer").innerText=invoice.customer;
document.getElementById("phone").innerText=invoice.phone;
document.getElementById("payment").innerText=invoice.payment;
document.getElementById("date").innerText=invoice.date;
document.getElementById("total").innerText=invoice.total;

// عرض الأصناف

let rows="";

invoice.items.forEach(i=>{

rows+=`
<tr>
<td>${i.code}</td>
<td>${i.name}</td>
<td>${i.qty}</td>
<td>${i.price}</td>
<td>${i.total}</td>
</tr>
`;

});

document.getElementById("items").innerHTML=rows;

}catch(e){

document.body.innerHTML="<div class='error'>❌ حدث خطأ في قراءة الفاتورة</div>";

}

}

</script>

</body>

</html>


</html>
