<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<title>تفاصيل الفاتورة</title>

<style>

body{
font-family:Tahoma;
background:#f5f5f5;
padding:20px;
direction:rtl
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc
}

h2{
text-align:center
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center
}

th{
background:#2196F3;
color:white
}

.total{
font-size:20px;
color:green;
margin-top:20px;
font-weight:bold
}

</style>

</head>

<body>

<div class="card">

<h2>🧾 تفاصيل الفاتورة</h2>

<p id="customer"></p>
<p id="phone"></p>
<p id="payment"></p>
<p id="date"></p>

<table>

<thead>

<tr>

<th>الكود</th>
<th>الصنف</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>

</tr>

</thead>

<tbody id="items"></tbody>

</table>

<div id="total" class="total"></div>

</div>


<script>

function getParam(name)
{
let url=new URL(window.location.href);
return url.searchParams.get(name);
}

let encoded=getParam("data");

if(encoded)
{

try{

let json=atob(decodeURIComponent(encoded));

let invoice=JSON.parse(json);

document.getElementById("customer").innerText=invoice.customer;
document.getElementById("phone").innerText=invoice.phone;
document.getElementById("payment").innerText=invoice.payment;
document.getElementById("date").innerText=invoice.date;
document.getElementById("total").innerText=invoice.total;

let rows="";

invoice.items.forEach(i=>{

rows+=`

<tr>

<td>${i.code}</td>
<td>${i.name}</td>
<td>${i.qty}</td>
<td>${i.price}</td>
<td>${i.total}</td>

</tr>

`;

});

document.getElementById("items").innerHTML=rows;

}catch(e){

document.body.innerHTML="حدث خطأ في قراءة الفاتورة";

}

}

</script>

</body>

</html>
