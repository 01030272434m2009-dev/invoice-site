<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تفاصيل الفاتورة الإلكترونية</title>

<style>
body {
    font-family: "Tahoma", sans-serif;
    background: #f7f9fc;
    padding: 20px;
    direction: rtl;
}

.card {
    background: #ffffff;
    padding: 35px 30px;
    border-radius: 15px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    max-width: 950px;
    margin: auto;
    border-top: 5px solid #2196F3;
}

h2 {
    text-align: center;
    color: #2196F3;
    margin-bottom: 25px;
    font-size: 24px;
}

.pharmacy {
    text-align: center;
    border-bottom: 2px dashed #ccc;
    padding-bottom: 18px;
    margin-bottom: 25px;
}

.pharmacy h3 {
    margin: 5px 0;
    color: #34495e;
    font-size: 22px;
    font-weight: bold;
}

.pharmacy p {
    margin: 4px 0;
    color: #666;
    font-size: 15px;
}

.info {
    margin: 8px 0;
    font-size: 17px;
    color: #555;
}

/* تحسين اسم العميل ورقم الهاتف */
.customer-info {
    background: #e8f0fe;
    border-radius: 10px;
    padding: 12px 15px;
    margin: 15px 0;
    display: flex;
    justify-content: space-between;
    font-size: 17px;
    font-weight: bold;
    color: #1a237e;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    table-layout: fixed;
}

th, td {
    border: 1px solid #ddd;
    padding: 12px;
    text-align: center;
    font-size: 16px;
    word-wrap: break-word;
}

th {
    background: #2196F3;
    color: white;
    text-transform: uppercase;
    letter-spacing: 1px;
}

tbody tr:hover {
    background-color: #f1f7fc;
    transition: 0.3s;
}

.total {
    font-size: 22px;
    color: #2ecc71;
    margin-top: 20px;
    font-weight: bold;
    text-align: center;
}

.thanks {
    text-align: center;
    margin-top: 25px;
    font-size: 18px;
    color: #34495e;
    font-style: italic;
}

.loading {
    text-align: center;
    font-size: 22px;
    color: #2196F3;
    margin-top: 100px;
    font-weight: bold;
}

.error {
    text-align: center;
    color: red;
    font-size: 20px;
    margin-top: 50px;
}
</style>
</head>

<body>
<div id="mainContainer">
    <div class="loading" id="loader">⏳ جاري تحميل بيانات الفاتورة السحابية من السيرفر...</div>
</div>

<script>
// دالة لجلب البارامترات من الرابط
function getParam(name){
    let url = new URL(window.location.href);
    return url.searchParams.get(name);
}

// رابط السيرفر السحابي الحالي (نفس الرابط المستضيف لبيانات جوجل شيت)
const apiBaseUrl = "https://script.google.com/macros/s/AKfycbx4ezTTarc4aVuQ1VR6dxQTMRGgJaaJ1OPGPxCiRGMYzPB3MKikKA7HuJ_vjzxkOu6h3Q/exec";

let invoiceId = getParam("invoiceId");

if(!invoiceId){
    document.getElementById("mainContainer").innerHTML = "<div class='error'>❌ خطأ: لم يتم تحديد رقم فاتورة صحيح في الرابط.</div>";
} else {
    // الاتصال بالسيرفر الحالي لجلب الفاتورة المطلوبة بناءً على الـ ID
    fetch(`${apiBaseUrl}?invoiceId=${invoiceId}`)
    .then(response => {
        if (!response.ok) {
            throw new Error("فشل الاتصال بالخادم السحابي");
        }
        return response.json();
    })
    .then(invoice => {
        if(invoice.error) {
            document.getElementById("mainContainer").innerHTML = `<div class='error'>❌ ${invoice.error}</div>`;
            return;
        }

        // بناء الهيكل الفلات وعرض البيانات المقروءة فوراً للعميل
        let htmlContent = `
        <div class="card">
            <div class="pharmacy">
                <h3>${invoice.pharmacyName || ''}</h3>
                ${invoice.pharmacyAddress ? `<p>العنوان: ${invoice.pharmacyAddress}</p>` : ''}
                ${invoice.pharmacyPhone ? `<p>📞 الهاتف: ${invoice.pharmacyPhone}</p>` : ''}
                ${invoice.commercialRegister ? `<p>سجل تجاري: ${invoice.commercialRegister}</p>` : ''}
                ${invoice.taxCard ? `<p>بطاقة ضريبية: ${invoice.taxCard}</p>` : ''}
                ${invoice.welcomeMessage ? `<p>${invoice.welcomeMessage}</p>` : ''}
            </div>

            <h2>🧾 تفاصيل الفاتورة رقم #${invoice.invoiceId}</h2>

            <div class="customer-info">
                <span>👤 العميل: <span>${invoice.customerName || 'عميل نقدي'}</span></span>
                <span>📞 الهاتف: <span>${invoice.customerPhone || 'غير مسجل'}</span></span>
            </div>

            <p class="info">💰 طريقة الدفع: ${invoice.paymentMethod || 'كاش'}</p>
            ${invoice.bankTransactionNo ? `<p class="info" style="color: #673ab7; font-weight: bold;">💳 رقم المعاملة البنكية: ${invoice.bankTransactionNo}</p>` : ''}
            <p class="info">📅 التاريخ: ${invoice.createdAt || ''}</p>

            <table>
                <thead>
                    <tr>
                        <th>الكود</th>
                        <th>الصنف</th>
                        <th>الكمية</th>
                        <th>السعر</th>
                        <th>الإجمالي</th>
                    </tr>
                </thead>
                <tbody>
        `;

        // إضافة الأصناف ديناميكياً لجدول العرض
        invoice.items.forEach(i => {
            htmlContent += `
                <tr>
                    <td>${i.code}</td>
                    <td>${i.name}</td>
                    <td>${i.qty}</td>
                    <td>${i.price} ج.م</td>
                    <td>${i.total} ج.م</td>
                </tr>`;
        });

        htmlContent += `
                </tbody>
            </table>

            <div class="total">الإجمالي الكلي: ${invoice.totalAmount}</div>
            <div class="thanks">${invoice.thanksMessage || 'شكراً لتعاملكم معنا!'}</div>
        </div>
        `;

        document.getElementById("mainContainer").innerHTML = htmlContent;
    })
    .catch(error => {
        console.error(error);
        document.getElementById("mainContainer").innerHTML = "<div class='error'>❌ حدث خطأ أثناء جلب الفاتورة من السيرفر السحابي، تأكد من اتصال الإنترنت.</div>";
    });
}
</script>
</body>
</html>
