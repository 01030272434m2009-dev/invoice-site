<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تفاصيل الفاتورة</title>

<style>
body {
    font-family: "Tahoma", sans-serif;
    background: #f7f9fc;
    padding: 20px;
    direction: rtl;
}

.card {
    background: #ffffff;
    padding: 35px 30px;
    border-radius: 15px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    max-width: 950px;
    margin: auto;
    border-top: 5px solid #2196F3;
}

h2 {
    text-align: center;
    color: #2196F3;
    margin-bottom: 25px;
    font-size: 24px;
}

.pharmacy {
    text-align: center;
    border-bottom: 2px dashed #ccc;
    padding-bottom: 18px;
    margin-bottom: 25px;
}

.pharmacy h3 {
    margin: 5px 0;
    color: #34495e;
    font-size: 22px;
    font-weight: bold;
}

.info {
    margin: 6px 0;
    font-size: 17px;
    color: #555;
}

/* تحسين اسم العميل ورقم الهاتف */
.customer-info {
    background: #e8f0fe;
    border-radius: 10px;
    padding: 12px 15px;
    margin: 15px 0;
    display: flex;
    justify-content: space-between;
    font-size: 17px;
    font-weight: bold;
    color: #1a237e;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    table-layout: fixed;
}

th, td {
    border: 1px solid #ddd;
    padding: 12px;
    text-align: center;
    font-size: 16px;
    word-wrap: break-word;
}

th {
    background: #2196F3;
    color: white;
    text-transform: uppercase;
    letter-spacing: 1px;
}

tbody tr:hover {
    background-color: #f1f7fc;
    transition: 0.3s;
}

.total {
    font-size: 22px;
    color: #2ecc71;
    margin-top: 20px;
    font-weight: bold;
    text-align: center;
}

.thanks {
    text-align: center;
    margin-top: 25px;
    font-size: 18px;
    color: #34495e;
    font-style: italic;
}

.error {
    text-align: center;
    color: red;
    font-size: 20px;
    margin-top: 50px;
}
</style>
</head>

<body>
<div class="card">

<div class="pharmacy">
<h3 id="pharmacyName"></h3>
<p id="pharmacyAddress"></p>
<p id="pharmacyPhone"></p>
<p id="pharmacyCR"></p>
<p id="pharmacyTax"></p>
<p id="pharmacyWelcome"></p>
</div>

<h2>🧾 تفاصيل الفاتورة</h2>

<div class="customer-info">
    <span>👤 العميل: <span id="customer"></span></span>
    <span>📞 الهاتف: <span id="phone"></span></span>
</div>

<p id="payment" class="info"></p>
<p id="date" class="info"></p>

<table>
<thead>
<tr>
<th>الكود</th>
<th>الصنف</th>
<th>الكمية</th>
<th>السعر</th>
<th>الإجمالي</th>
</tr>
</thead>
<tbody id="items"></tbody>
</table>

<div id="total" class="total"></div>
<div id="thanks" class="thanks"></div>
</div>

<script>
function getParam(name){
    let url = new URL(window.location.href);
    return url.searchParams.get(name);
}

// فك Base64 مع دعم العربية
function decodeBase64UTF8(base64){
    let binary = atob(base64);
    let bytes = new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++){
        bytes[i] = binary.charCodeAt(i);
    }
    return new TextDecoder().decode(bytes);
}

let encoded = getParam("data");

if(!encoded){
    document.body.innerHTML = "<div class='error'>❌ لا توجد بيانات فاتورة</div>";
}else{
    try{
        let decoded = decodeURIComponent(encoded);
        let json = decodeBase64UTF8(decoded);
        let invoice = JSON.parse(json);

        // بيانات الصيدلية
        if(invoice.pharmacy){
            document.getElementById("pharmacyName").innerText = invoice.pharmacy.name;
            document.getElementById("pharmacyAddress").innerText = "العنوان: " + invoice.pharmacy.address;
            document.getElementById("pharmacyPhone").innerText = "📞 " + invoice.pharmacy.phone;
            document.getElementById("pharmacyCR").innerText = "سجل تجاري: " + invoice.pharmacy.cr;
            document.getElementById("pharmacyTax").innerText = "بطاقة ضريبية: " + invoice.pharmacy.tax;
            document.getElementById("pharmacyWelcome").innerText = invoice.pharmacy.welcome;
            document.getElementById("thanks").innerText = invoice.pharmacy.thanks;
        }

        // بيانات الفاتورة
        document.getElementById("customer").innerText = invoice.customer;
        document.getElementById("phone").innerText = invoice.phone;
        document.getElementById("payment").innerText = invoice.payment;
        document.getElementById("date").innerText = invoice.date;
        document.getElementById("total").innerText = invoice.total;

        // عرض الأصناف
        let rows = "";
        invoice.items.forEach(i=>{
            rows += `
            <tr>
                <td>${i.code}</td>
                <td>${i.name}</td>
                <td>${i.qty}</td>
                <td>${i.price}</td>
                <td>${i.total}</td>
            </tr>`;
        });
        document.getElementById("items").innerHTML = rows;

    }catch(e){
        document.body.innerHTML = "<div class='error'>❌ حدث خطأ في قراءة الفاتورة</div>";
    }
}
</script>
</body>
</html>
